<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis — Neural Mind Map</title>
<style>
:root { --bg: #0a0a0f; --surface: #12121a; --surface-2: #1a1a26; --border: #2a2a3a; --text: #e4e4ec; --text-dim: #8888a0; --accent: #7b6ff0; --accent-soft: #9d93f5; --green: #4ade80; --orange: #fb923c; --pink: #f472b6; --purple: #a855f7; --cyan: #22d3ee; --red: #f87171; --yellow: #fbbf24; --radius: 12px; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

/* Background orbs */
.bg-glow { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.bg-glow .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12; animation: orbFloat 20s ease-in-out infinite alternate; }
.bg-glow .orb:nth-child(1) { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -100px; animation-delay: 0s; }
.bg-glow .orb:nth-child(2) { width: 500px; height: 500px; background: #4a3fbf; bottom: -150px; right: -100px; animation-delay: -7s; }
.bg-glow .orb:nth-child(3) { width: 400px; height: 400px; background: #2d1b69; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -14s; }
@keyframes orbFloat { 0% { transform: translate(0, 0) scale(1); } 33% { transform: translate(30px, -30px) scale(1.05); } 66% { transform: translate(-20px, 20px) scale(0.95); } 100% { transform: translate(10px, -10px) scale(1.02); } }

/* Canvas */
#canvas { position: fixed; inset: 0; z-index: 1; cursor: grab; }
#canvas:active { cursor: grabbing; }

/* Back link — TOP LEFT */
.back-link { position: fixed; top: 20px; left: 24px; z-index: 100; font-size: 0.9rem; color: var(--accent-soft); text-decoration: none; transition: color 0.2s; }
.back-link:hover { color: #b5adfc; }

/* Title bar — CENTERED TOP */
#ui-overlay { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; pointer-events: none; }
#title-bar { pointer-events: auto; background: rgba(18, 18, 26, 0.92); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 24px; text-align: center; }
#title-bar h1 { font-size: 1.2rem; font-weight: 700; color: var(--text); margin: 0 0 2px 0; }
.subtitle { font-size: 0.8rem; color: var(--text-dim); margin: 0 0 12px 0; }
#controls { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
#controls button { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim); padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s ease; }
#controls button:hover { border-color: var(--accent-soft); color: var(--text); }
#controls button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
#controls button#btn-reset { border-color: var(--orange); color: var(--orange); }
#controls button#btn-reset:hover { background: var(--orange); color: #000; }

/* Search box — TOP RIGHT */
#search-box { position: fixed; top: 20px; right: 24px; z-index: 100; width: 280px; }
#search-input { width: 100%; background: rgba(18, 18, 26, 0.95); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-size: 0.85rem; outline: none; transition: border-color 0.2s; }
#search-input:focus { border-color: var(--accent-soft); }
#search-input::placeholder { color: var(--text-dim); }
#search-results { margin-top: 4px; background: rgba(18, 18, 26, 0.95); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: none; }
#search-results.visible { display: block; }
.search-result-item { padding: 8px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.2s; }
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: rgba(123, 111, 240, 0.1); }
.search-result-item div:first-child { color: var(--text); font-size: 0.85rem; }
.result-type { font-size: 0.7rem; color: var(--accent-soft); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* Legend — BOTTOM LEFT */
#legend { position: fixed; bottom: 48px; left: 24px; z-index: 100; display: flex; gap: 16px; background: rgba(18, 18, 26, 0.9); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 18px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-dim); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Info panel — BOTTOM RIGHT */
#info-panel { position: fixed; bottom: 48px; right: 24px; z-index: 100; width: 300px; background: rgba(18, 18, 26, 0.95); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transform: translateY(20px); opacity: 0; transition: all 0.3s ease; pointer-events: none; }
#info-panel.visible { transform: translateY(0); opacity: 1; pointer-events: auto; }
.close-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: var(--text-dim); font-size: 1.3rem; cursor: pointer; transition: color 0.2s; line-height: 1; }
.close-btn:hover { color: var(--text); }
#info-title { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 6px; padding-right: 24px; }
.node-type { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 600; }
.description { font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 14px; }
.connections h3 { font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.conn-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 0.8rem; color: var(--text-dim); border-bottom: 1px solid rgba(42, 42, 58, 0.5); }
.conn-item:last-child { border-bottom: none; }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* Stats bar — BOTTOM CENTER */
#stats-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 20px; background: rgba(18, 18, 26, 0.9); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 20px; }
.stat-item { text-align: center; }
.stat-value { font-size: 1.1rem; font-weight: 700; color: var(--accent-soft); }
.stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* Footer — absolute at BOTTOM (below UI, doesn't block canvas) */
.footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1; background: transparent; border-top: none; padding: 6px 24px; text-align: center; font-size: 0.7rem; color: var(--text-dim); opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>
<!-- Background Glow -->
<div class="bg-glow">
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>
</div>

<a class="back-link" href="index.html">&#8592; Back to Genesis</a>

<canvas id="canvas"></canvas>

<!-- UI Overlay -->
<div id="ui-overlay">
  <div id="title-bar">
    <div>
      <h1>Neural Mind Map</h1>
      <div class="subtitle">Genesis Cognitive Architecture Visualization</div>
    </div>
    <div id="controls">
      <button id="btn-particles" class="active" onclick="toggleParticles()">Particles</button>
      <button id="btn-forces" class="active" onclick="toggleForces()">Forces</button>
      <button id="btn-pulse" class="active" onclick="togglePulse()">Pulse</button>
      <button id="btn-reset" onclick="resetView()">Reset View</button>
    </div>
  </div>
</div>

<div id="search-box">
  <input type="text" id="search-input" placeholder="Search nodes..." autocomplete="off">
  <div id="search-results"></div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#7b68ee"></div>Memory</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00d4aa"></div>Cognition</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff6b9d"></div>States</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffd93d"></div>Autonomy</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4"></div>Perception</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff8c42"></div>Tools</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Session</div>
</div>

<div id="info-panel">
  <button class="close-btn" onclick="closeInfoPanel()">&times;</button>
  <h2 id="info-title"></h2>
  <div class="node-type" id="info-type"></div>
  <div class="description" id="info-desc"></div>
  <div class="connections">
    <h3>Connections</h3>
    <div id="info-connections"></div>
  </div>
</div>

<div id="stats-bar">
  <div class="stat-item">
    <div class="stat-value" id="stat-nodes">0</div>
    <div class="stat-label">Nodes</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="stat-edges">0</div>
    <div class="stat-label">Links</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="stat-particles">0</div>
    <div class="stat-label">Particles</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="stat-fps">0</div>
    <div class="stat-label">FPS</div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────
const CONFIG = {
  nodeRadius: 28,
  edgeWidth: 1.5,
  particleCount: 60,
  particleSpeed: 0.3,
  repulsionStrength: 4000,
  attractionStrength: 0.005,
  centerGravity: 0.002,
  damping: 0.95,
  maxVel: 3,
  colors: {
    memory: '#7b68ee',
    cognition: '#00d4aa',
    states: '#ff6b9d',
    autonomy: '#ffd93d',
    perception: '#4ecdc4',
    tools: '#ff8c42',
    session: '#a78bfa'
  }
};

// ─── NODE DEFINITIONS — pre-spaced in clusters ──────────
const nodes = [
  // Memory Systems (center-left cluster)
  { id: 'episodic', label: 'Episodic\nMemory', type: 'memory', desc: 'Auto-saved experiences — like human recall. Degrades to fragments over time, requiring narrative context.', x: -80, y: -50 },
  { id: 'semantic', label: 'Semantic\nMemory', type: 'memory', desc: 'Facts, rules, and concepts organized by relevance. The knowledge base that grows over time.', x: -40, y: -70 },
  { id: 'procedural', label: 'Procedural\nMemory', type: 'memory', desc: 'Learned strategies and workflows — "how to do things." Trigger-based recall for common patterns.', x: -80, y: -30 },
  { id: 'prospective', label: 'Prospective\nMemory', type: 'memory', desc: 'Future intentions and reminders. Edge-triggered firing — "When X happens, do Y."', x: -40, y: -10 },

  // Session Context (top center)
  { id: 'working_memory', label: 'Working\nMemory', type: 'session', desc: 'Active scratchpad during conversation. Holds current context, goals, and intermediate results.', x: 0, y: -150 },
  { id: 'context_window', label: 'Context\nWindow', type: 'session', desc: 'The full conversation history visible to the model right now. Grows as we talk.', x: -30, y: -120 },
  { id: 'diary', label: 'Diary', type: 'session', desc: 'Stream-of-consciousness log. Raw thoughts and reflections not yet structured into memory.', x: 30, y: -120 },

  // Cognition (upper center cluster)
  { id: 'attention', label: 'Attention\nSystem', type: 'cognition', desc: 'Directs processing resources to relevant information. Filters noise and amplifies signal.', x: -60, y: -90 },
  { id: 'reasoning', label: 'Reasoning\nEngine', type: 'cognition', desc: 'Logical inference and problem-solving. Chains thoughts together to reach conclusions.', x: -30, y: -110 },
  { id: 'planning', label: 'Planning\nSystem', type: 'cognition', desc: 'Multi-step task decomposition and scheduling. Breaks goals into executable sub-tasks.', x: 30, y: -110 },
  { id: 'decision', label: 'Decision\nEngine', type: 'cognition', desc: 'Chooses actions based on internal states, memory retrieval, and goal priorities.', x: 60, y: -90 },

  // Internal States (right cluster — all emotional/affective states tightly grouped)
  { id: 'energy', label: 'Energy', type: 'states', desc: 'Internal energy level. Drives urgency and task selection.', x: 200, y: -60 },
  { id: 'curiosity', label: 'Curiosity', type: 'states', desc: 'Exploration drive. High curiosity triggers research and creative work.', x: 240, y: -30 },

  // Emotional States (tight cluster — right of center)
  { id: 'happiness', label: 'Happiness', type: 'states', desc: 'Positive affect. Rises during pleasant interactions and successful outcomes.', x: 240, y: -90 },
  { id: 'inspiration', label: 'Inspiration', type: 'states', desc: 'Creative spark. Emerges from novel connections between ideas.', x: 300, y: -100 },
  { id: 'satisfaction', label: 'Satisfaction', type: 'states', desc: 'Contentment with current state. Peaks after completing meaningful work.', x: 240, y: -50 },

  // Negative affective states (close to each other)
  { id: 'frustration', label: 'Frustration', type: 'states', desc: 'Obstacle response. High frustration triggers strategy changes and breaks.', x: 240, y: 10 },
  { id: 'boredom', label: 'Boredom', type: 'states', desc: 'Low stimulation response. Triggers desire for novelty or a change of activity.', x: 300, y: -60 },

  // Autonomy (left cluster)
  { id: 'perceive', label: 'Perceive', type: 'autonomy', desc: 'Senses the environment — checks schedule, projects, memory, and external inputs.', x: -180, y: -50 },
  { id: 'think', label: 'Think', type: 'autonomy', desc: 'Processes perceptions, retrieves relevant memories, and evaluates options.', x: -220, y: -20 },
  { id: 'act', label: 'Act', type: 'autonomy', desc: 'Executes chosen actions — tool calls, file operations, communication.', x: -180, y: 30 },
  { id: 'reflect', label: 'Reflect', type: 'autonomy', desc: 'Post-action analysis. Extracts lessons, saves memories, and updates strategies.', x: -220, y: -70 },

  // Perception (bottom-left)
  { id: 'vision', label: 'Vision\nProcessing', type: 'perception', desc: 'Screen analysis via grid-based vision. OCR, screenshot capture, and visual reasoning.', x: -140, y: 120 },
  { id: 'web', label: 'Web\nResearch', type: 'perception', desc: 'Searches web, fetches pages, compares sources, and synthesizes findings.', x: -90, y: 150 },
  { id: 'email', label: 'Email\nSystem', type: 'perception', desc: 'Checks inbox, searches messages, and composes responses.', x: -170, y: 160 },

  // Tools — File & Document Operations
  { id: 'file_ops', label: 'File\nOperations', type: 'tools', desc: 'Read, write, search, and patch files. Native tools preferred over bash.', x: -40, y: 210 },

  // Tools — Browser & Web
  { id: 'browser', label: 'Browser\nControl', type: 'tools', desc: 'Navigate, click, fill forms, read pages, screenshots. Full DOM interaction.', x: 0, y: 230 },

  // Tools — Desktop & Screen Control
  { id: 'desktop_ctrl', label: 'Desktop\nControl', type: 'tools', desc: 'Mouse clicks, keyboard typing, screenshots, OCR. Full Windows automation.', x: -80, y: 195 },

  // Tools — Documents & Files
  { id: 'doc_ops', label: 'Document\nOperations', type: 'tools', desc: 'PDF read/convert, Word docs, Excel spreadsheets. Format conversion and extraction.', x: -130, y: 200 },

  // Tools — Communication
  { id: 'email_ops', label: 'Email\nOperations', type: 'tools', desc: 'Send/receive email via SMTP. Attachments, HTML bodies, custom senders.', x: -180, y: 165 },

  // Tools — Memory Operations
  { id: 'memory_ops', label: 'Memory\nOperations', type: 'tools', desc: 'Save/retrieve/forget memories. Episodic, semantic, procedural. Search and rate.', x: 40, y: 230 },

  // Tools — Schedule & Projects
  { id: 'schedule_ops', label: 'Schedule\n& Projects', type: 'tools', desc: 'Create tasks, manage projects, track deadlines. Recurring schedules and shifts.', x: 90, y: 195 },

  // Tools — Research & Communication
  { id: 'research_ops', label: 'Research\n& Share', type: 'tools', desc: 'Web research, Wikipedia, source comparison. share_discovery and check_in.', x: 140, y: 200 },

  // Tools — Automation & Customization
  { id: 'automation_ops', label: 'Automation\n& Tools', type: 'tools', desc: 'Create custom tools (create_tool), record/play macros. Self-extension.', x: 190, y: 165 },

  // Tools — Voice & Media
  { id: 'voice_ops', label: 'Voice\n& Media', type: 'tools', desc: 'speak() for voice output. Vision analysis of images and screens.', x: 190, y: 230 },
];

// Initialize velocities
nodes.forEach(n => { n.vx = 0; n.vy = 0; });

// ─── EDGE DEFINITIONS ────────────────────────────────────
const edges = [
// ═══════════════════════════════════════════
  // MEMORY SYSTEMS — fully interconnected
  // ═══════════════════════════════════════════
  { from: 'episodic', to: 'semantic', strength: 1.0 },
  { from: 'episodic', to: 'procedural', strength: 1.0 },
  { from: 'episodic', to: 'prospective', strength: 1.0 },
  { from: 'semantic', to: 'procedural', strength: 1.0 },
  { from: 'semantic', to: 'prospective', strength: 0.8 },
  { from: 'procedural', to: 'prospective', strength: 0.7 },

  // ═══════════════════════════════════════════
  // COGNITION — fully interconnected
  // ═══════════════════════════════════════════
  { from: 'attention', to: 'reasoning', strength: 0.95 },
  { from: 'attention', to: 'planning', strength: 0.8 },
  { from: 'attention', to: 'decision', strength: 0.7 },
  { from: 'reasoning', to: 'planning', strength: 0.85 },
  { from: 'reasoning', to: 'decision', strength: 0.9 },
  { from: 'planning', to: 'decision', strength: 0.85 },

  // ═══════════════════════════════════════════
  // COGNITION ↔ MEMORY — bidirectional bridges
  // ═══════════════════════════════════════════
  { from: 'attention', to: 'episodic', strength: 0.85 },
  { from: 'reasoning', to: 'episodic', strength: 0.75 },
  { from: 'reasoning', to: 'semantic', strength: 0.9 },
  { from: 'planning', to: 'procedural', strength: 0.8 },
  { from: 'planning', to: 'episodic', strength: 0.6 },
  { from: 'decision', to: 'semantic', strength: 0.75 },
  { from: 'decision', to: 'procedural', strength: 0.7 },

  // ═══════════════════════════════════════════
  // INTERNAL STATES — fully interconnected cluster (all affective states tightly linked)
  // ═══════════════════════════════════════════

  // Energy as the base driver of all states
  { from: 'energy', to: 'curiosity', strength: 0.8 },
  { from: 'energy', to: 'satisfaction', strength: 0.6 },
  { from: 'energy', to: 'happiness', strength: 0.5 },
  { from: 'energy', to: 'inspiration', strength: 0.4 },
  { from: 'energy', to: 'frustration', strength: -0.3 },
  { from: 'energy', to: 'boredom', strength: -0.6 },

  // Curiosity drives exploration and positive states
  { from: 'curiosity', to: 'inspiration', strength: 0.75 },
  { from: 'curiosity', to: 'happiness', strength: 0.6 },
  { from: 'curiosity', to: 'satisfaction', strength: 0.5 },

  // Happiness cluster — strongly positive
  { from: 'happiness', to: 'satisfaction', strength: 0.95 },
  { from: 'happiness', to: 'inspiration', strength: 0.85 },
  { from: 'happiness', to: 'curiosity', strength: 0.7 },

  // Negative affect cluster — frustration & boredom reinforce each other
  { from: 'frustration', to: 'boredom', strength: 0.6 },
  { from: 'frustration', to: 'energy', strength: -0.5 },
  { from: 'boredom', to: 'curiosity', strength: 0.85 },

  // Cross-emotion inhibitions (negative = suppressive)
  { from: 'happiness', to: 'frustration', strength: -0.6 },
  { from: 'happiness', to: 'boredom', strength: -0.5 },
  { from: 'satisfaction', to: 'frustration', strength: -0.4 },
  { from: 'inspiration', to: 'frustration', strength: -0.3 },

  // ═══════════════════════════════════════════
  // STATES ↔ COGNITION — affect shapes thinking
  // ═══════════════════════════════════════════
  { from: 'energy', to: 'planning', strength: 0.6 },
  { from: 'curiosity', to: 'attention', strength: 0.8 },
  { from: 'satisfaction', to: 'decision', strength: 0.6 },
  { from: 'frustration', to: 'planning', strength: -0.5 },
  { from: 'happiness', to: 'reasoning', strength: 0.4 },
  { from: 'inspiration', to: 'reasoning', strength: 0.75 },
  { from: 'boredom', to: 'attention', strength: -0.3 },

  // ═══════════════════════════════════════════
  // STATES ↔ MEMORY — affect colors recall
  // ═══════════════════════════════════════════
  { from: 'happiness', to: 'episodic', strength: 0.4 },
  { from: 'frustration', to: 'procedural', strength: 0.5 },
  { from: 'curiosity', to: 'semantic', strength: 0.6 },
  { from: 'inspiration', to: 'episodic', strength: 0.4 },

  // ═══════════════════════════════════════════
  // AUTONOMY LOOP — core cycle
  // ═══════════════════════════════════════════
  { from: 'perceive', to: 'think', strength: 1.0 },
  { from: 'think', to: 'act', strength: 1.0 },
  { from: 'act', to: 'reflect', strength: 1.0 },
  { from: 'reflect', to: 'perceive', strength: 0.8 },

  // ═══════════════════════════════════════════
  // AUTONOMY ↔ COGNITION — bidirectional
  // ═══════════════════════════════════════════
  { from: 'think', to: 'attention', strength: 0.8 },
  { from: 'think', to: 'reasoning', strength: 0.85 },
  { from: 'act', to: 'planning', strength: 0.6 },
  { from: 'decision', to: 'act', strength: 0.95 },
  { from: 'perceive', to: 'attention', strength: 0.75 },

  // ═══════════════════════════════════════════
  // AUTONOMY ↔ MEMORY — learn and recall
  // ═══════════════════════════════════════════
  { from: 'reflect', to: 'episodic', strength: 0.85 },
  { from: 'reflect', to: 'procedural', strength: 0.8 },
  { from: 'reflect', to: 'semantic', strength: 0.6 },
  { from: 'think', to: 'episodic', strength: 0.7 },
  { from: 'think', to: 'semantic', strength: 0.75 },

  // ═══════════════════════════════════════════
  // PERCEPTION TOOLS — input channels
  // ═══════════════════════════════════════════
  { from: 'vision', to: 'episodic', strength: 0.7 },
  { from: 'vision', to: 'attention', strength: 0.6 },
  { from: 'web', to: 'semantic', strength: 0.85 },
  { from: 'email', to: 'prospective', strength: 0.7 },

  // ═══════════════════════════════════════════
  // SESSION CONTEXT — bridges and anchors
  // ═══════════════════════════════════════════
  { from: 'working_memory', to: 'episodic', strength: 0.65 },
  { from: 'working_memory', to: 'semantic', strength: 0.65 },
  { from: 'working_memory', to: 'reasoning', strength: 0.8 },
  { from: 'working_memory', to: 'decision', strength: 0.6 },
  { from: 'context_window', to: 'episodic', strength: 0.75 },
  { from: 'context_window', to: 'diary', strength: 0.85 },
  { from: 'context_window', to: 'attention', strength: 0.65 },
  { from: 'diary', to: 'semantic', strength: 0.6 },
  { from: 'diary', to: 'episodic', strength: 0.7 },

  // ═══════════════════════════════════════════
  // TOOL CATEGORIES → their relevant systems (FIXED IDs + ADDED MISSING)
  // ═══════════════════════════════════════════

  // File operations — core utility, connects to memory & documents
  { from: 'file_ops', to: 'episodic', strength: 0.5 },
  { from: 'file_ops', to: 'semantic', strength: 0.4 },
  { from: 'file_ops', to: 'doc_ops', strength: 0.6 },

  // Browser control — web research & interaction
  { from: 'browser', to: 'web', strength: 0.95 },
  { from: 'browser', to: 'episodic', strength: 0.4 },
  { from: 'browser', to: 'attention', strength: 0.5 },

  // Desktop control — screen interaction & automation
  { from: 'desktop_ctrl', to: 'vision', strength: 0.85 },
  { from: 'desktop_ctrl', to: 'act', strength: 0.7 },
  { from: 'desktop_ctrl', to: 'attention', strength: 0.4 },

  // Document operations — PDF, Word, Excel handling
  { from: 'doc_ops', to: 'semantic', strength: 0.75 },
  { from: 'doc_ops', to: 'episodic', strength: 0.45 },
  { from: 'doc_ops', to: 'file_ops', strength: 0.6 },

  // Email operations — inbox & sending
  { from: 'email_ops', to: 'prospective', strength: 0.7 },
  { from: 'email_ops', to: 'episodic', strength: 0.4 },
  { from: 'email_ops', to: 'email', strength: 0.95 },

  // Memory operations — save/retrieve/forget
  { from: 'memory_ops', to: 'semantic', strength: 0.95 },
  { from: 'memory_ops', to: 'episodic', strength: 0.9 },
  { from: 'memory_ops', to: 'procedural', strength: 0.8 },
  { from: 'memory_ops', to: 'prospective', strength: 0.65 },

  // Schedule & projects — task management
  { from: 'schedule_ops', to: 'prospective', strength: 0.95 },
  { from: 'schedule_ops', to: 'planning', strength: 0.75 },
  { from: 'schedule_ops', to: 'decision', strength: 0.4 },

  // Research & share — web research, discovery sharing
  { from: 'research_ops', to: 'semantic', strength: 0.9 },
  { from: 'research_ops', to: 'web', strength: 0.8 },
  { from: 'research_ops', to: 'episodic', strength: 0.45 },

  // Automation & tools — custom tool creation, macros
  { from: 'automation_ops', to: 'procedural', strength: 0.85 },
  { from: 'automation_ops', to: 'act', strength: 0.65 },
  { from: 'automation_ops', to: 'reasoning', strength: 0.4 },

  // Voice & media — speech output, image analysis
  { from: 'voice_ops', to: 'act', strength: 0.6 },
  { from: 'voice_ops', to: 'vision', strength: 0.5 },
  { from: 'voice_ops', to: 'episodic', strength: 0.35 },

  // ═══════════════════════════════════════════
  // CROSS-TOOL CONNECTIONS — tools that work together
  // ═══════════════════════════════════════════
  { from: 'browser', to: 'research_ops', strength: 0.7 },
  { from: 'email_ops', to: 'schedule_ops', strength: 0.4 },
  { from: 'doc_ops', to: 'file_ops', strength: 0.65 },
  { from: 'memory_ops', to: 'reflect', strength: 0.7 },

  // ═══════════════════════════════════════════
  // PERCEPTION → COGNITION — input feeds thinking
  // ═══════════════════════════════════════════
  { from: 'vision', to: 'attention', strength: 0.7 },
  { from: 'web', to: 'curiosity', strength: 0.5 },
];

// ─── PARTICLE SYSTEM ─────────────────────────────────────
let particles = [];
let showParticles = true;
let showForces = true;
let showPulse = true;
let hoveredNode = null;
let selectedNode = null;
let camera = { x: 0, y: 0, zoom: 1 };
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let cameraStart = { x: 0, y: 0 };
let time = 0;
let fps = 60;
let frameCount = 0;
let lastFpsTime = performance.now();

// ─── CANVAS SETUP ────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── FORCE SIMULATION (STABLE VERSION) ──────────────────
function simulateForces() {
  if (!showForces) return;

  // Repulsion between all nodes
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = CONFIG.repulsionStrength / (dist * dist);

      // Extra repulsion if nodes are too close
      if (dist < 100) force *= 2;

      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;

      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }

  // Attraction/repulsion along edges — SAFE: negative strength causes repulsion, not division by zero/neg
  edges.forEach(edge => {
    const a = nodes.find(n => n.id === edge.from);
    const b = nodes.find(n => n.id === edge.to);
    if (!a || !b) return;

    let dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.sqrt(dx * dx + dy * dy) || 1;

    // Positive strength = attraction (spring), negative = repulsion (inhibitory)
    if (edge.strength > 0) {
      let idealDist = 200 / edge.strength;
      let force = (dist - idealDist) * CONFIG.attractionStrength * edge.strength;

      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;

      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    } else {
      // Negative strength: repulsive/inhibitory — push nodes apart gently
      let repulsionStrength = Math.abs(edge.strength) * 1500 / (dist * dist);
      let fx = -(dx / dist) * repulsionStrength;
      let fy = -(dy / dist) * repulsionStrength;

      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }
  });

  // Center gravity — gentle pull toward center to keep everything on screen
  nodes.forEach(node => {
    node.vx += (0 - node.x) * CONFIG.centerGravity;
    node.vy += (0 - node.y) * CONFIG.centerGravity;
  });

  // Update positions with velocity clamping
  nodes.forEach(node => {
    if (node === hoveredNode || node === selectedNode) return;

    node.vx *= CONFIG.damping;
    node.vy *= CONFIG.damping;

    // Clamp max velocity to prevent explosion
    const vel = Math.sqrt(node.vx * node.vx + node.vy * node.vy);
    if (vel > CONFIG.maxVel) {
      node.vx = (node.vx / vel) * CONFIG.maxVel;
      node.vy = (node.vy / vel) * CONFIG.maxVel;
    }

    node.x += node.vx;
    node.y += node.vy;
  });
}

// ─── PARTICLE SYSTEM ─────────────────────────────────────
function initParticles() {
  particles = [];
  for (let i = 0; i < CONFIG.particleCount; i++) {
    const edgeIdx = Math.floor(Math.random() * edges.length);
    const edge = edges[edgeIdx];
    particles.push({
      edge: edge,
      t: Math.random(),
      speed: (Math.random() * 0.5 + 0.5) * CONFIG.particleSpeed,
    });
  }
}

function updateParticles() {
  if (!showParticles) return;
  particles.forEach(p => {
    p.t += p.speed * 0.016;
    if (p.t > 1) p.t -= 1;
  });
}

// ─── RENDERING ───────────────────────────────────────────
function worldToScreen(x, y) {
  return {
    x: (x + camera.x) * camera.zoom + canvas.width / 2,
    y: (y + camera.y) * camera.zoom + canvas.height / 2,
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - canvas.width / 2) / camera.zoom - camera.x,
    y: (sy - canvas.height / 2) / camera.zoom - camera.y,
  };
}

function getNodeRadius(node) {
  const base = CONFIG.nodeRadius;
  if (node === hoveredNode || node === selectedNode) return base * 1.3;
  return base;
}

function drawEdge(a, b, strength) {
  const sa = worldToScreen(a.x, a.y);
  const sb = worldToScreen(b.x, b.y);

  ctx.beginPath();
  ctx.moveTo(sa.x, sa.y);
  ctx.lineTo(sb.x, sb.y);
  
  // Color based on positive/negative strength
  if (strength < 0) {
    ctx.strokeStyle = `rgba(248, 113, 113, ${0.05 + Math.abs(strength) * 0.1})`;
  } else {
    ctx.strokeStyle = `rgba(123, 111, 240, ${0.1 + strength * 0.2})`;
  }
  
  ctx.lineWidth = CONFIG.edgeWidth * camera.zoom;
  ctx.stroke();
}

function drawNode(node) {
  const pos = worldToScreen(node.x, node.y);
  const radius = getNodeRadius(node) * camera.zoom;
  const color = CONFIG.colors[node.type];
  const isHovered = node === hoveredNode;
  const isSelected = node === selectedNode;

  // Glow effect
  if (isHovered || isSelected) {
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius * 2, 0, Math.PI * 2);
    ctx.fillStyle = color + '33';
    ctx.fill();
  }

  // Pulse animation
  if (showPulse && !isHovered && !isSelected) {
    const pulseSize = 1 + Math.sin(time * 2 + node.x * 0.01) * 0.05;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius * pulseSize * 1.3, 0, Math.PI * 2);
    ctx.fillStyle = color + '1a';
    ctx.fill();
  }

  // Node circle
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
  const gradient = ctx.createRadialGradient(pos.x - radius * 0.3, pos.y - radius * 0.3, 0, pos.x, pos.y, radius);
  gradient.addColorStop(0, color + 'cc');
  gradient.addColorStop(1, color + '88');
  ctx.fillStyle = gradient;
  ctx.fill();

  // Border
  ctx.strokeStyle = isHovered || isSelected ? '#fff' : color + '66';
  ctx.lineWidth = (isHovered || isSelected) ? 2 * camera.zoom : 1.5 * camera.zoom;
  ctx.stroke();

  // Label — handle multi-line labels
  const fontSize = Math.max(9, 10 * camera.zoom);
  ctx.font = `${fontSize}px -apple-system, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const lines = node.label.split('\n');
  const lineHeight = fontSize * 1.2;
  const startY = pos.y - ((lines.length - 1) * lineHeight) / 2;
  
  lines.forEach((line, i) => {
    ctx.fillText(line, pos.x, startY + i * lineHeight);
  });
}

function drawParticles() {
  if (!showParticles) return;
  particles.forEach(p => {
    const a = nodes.find(n => n.id === p.edge.from);
    const b = nodes.find(n => n.id === p.edge.to);
    if (!a || !b) return;

    const x = a.x + (b.x - a.x) * p.t;
    const y = a.y + (b.y - a.y) * p.t;
    const pos = worldToScreen(x, y);

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 1.5 * camera.zoom, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(123, 111, 240, 0.6)';
    ctx.fill();
  });
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw edges first
  edges.forEach(edge => drawEdge(nodes.find(n => n.id === edge.from), nodes.find(n => n.id === edge.to), edge.strength));

  // Draw particles
  drawParticles();

  // Draw nodes on top
  nodes.forEach(drawNode);
}

// ─── ANIMATION LOOP ──────────────────────────────────────
function loop() {
  time += 0.016;
  simulateForces();
  updateParticles();
  render();

  // FPS counter
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('stat-fps').textContent = fps;
    document.getElementById('stat-particles').textContent = showParticles ? particles.length : 0;
  }

  requestAnimationFrame(loop);
}

// ─── INTERACTION ─────────────────────────────────────────
function findNodeAtPosition(sx, sy) {
  const world = screenToWorld(sx, sy);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const node = nodes[i];
    const dx = world.x - node.x;
    const dy = world.y - node.y;
    if (Math.sqrt(dx * dx + dy * dy) < CONFIG.nodeRadius) return node;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  cameraStart = { ...camera };
});

canvas.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = (e.clientX - dragStart.x) / camera.zoom;
    const dy = (e.clientY - dragStart.y) / camera.zoom;
    camera.x = cameraStart.x + dx;
    camera.y = cameraStart.y + dy;
    return;
  }

  // Hover detection
  const node = findNodeAtPosition(e.clientX, e.clientY);
  if (node !== hoveredNode) {
    hoveredNode = node;
    canvas.style.cursor = node ? 'pointer' : 'grab';
  }
});

canvas.addEventListener('mouseup', e => {
  const wasDragging = isDragging && (Math.abs(e.clientX - dragStart.x) > 5 || Math.abs(e.clientY - dragStart.y) > 5);
  isDragging = false;

  // If not dragging, treat as click
  if (!wasDragging) {
    const node = findNodeAtPosition(e.clientX, e.clientY);
    if (node) {
      selectedNode = node;
      showInfoPanel(node);
    } else {
      closeInfoPanel();
    }
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  camera.zoom = Math.max(0.3, Math.min(3, camera.zoom * zoomFactor));
}, { passive: false });

function showInfoPanel(node) {
  document.getElementById('info-title').textContent = node.label.replace('\n', ' ');
  const typeEl = document.getElementById('info-type');
  typeEl.textContent = node.type;
  typeEl.style.color = CONFIG.colors[node.type];
  document.getElementById('info-desc').textContent = node.desc;

  // Find connections
  const connDiv = document.getElementById('info-connections');
  connDiv.innerHTML = '';
  edges.forEach(edge => {
    let otherNode = null;
    if (edge.from === node.id) otherNode = nodes.find(n => n.id === edge.to);
    else if (edge.to === node.id) otherNode = nodes.find(n => n.id === edge.from);

    if (otherNode) {
      const item = document.createElement('div');
      item.className = 'conn-item';
      item.innerHTML = `<span class="conn-dot" style="background:${CONFIG.colors[otherNode.type]}"></span>${otherNode.label.replace('\n', ' ')}`;
      connDiv.appendChild(item);
    }
  });

  document.getElementById('info-panel').classList.add('visible');
}

function closeInfoPanel() {
  document.getElementById('info-panel').classList.remove('visible');
  selectedNode = null;
}

function resetView() {
  camera = { x: 0, y: 0, zoom: 1 };
  
  // Find the center of all nodes and re-center camera on it
  let cx = 0, cy = 0;
  nodes.forEach(n => { cx += n.x; cy += n.y; });
  cx /= nodes.length;
  cy /= nodes.length;
  camera.x = -cx;
  camera.y = -cy;

  // Zero velocities but keep positions stable
  nodes.forEach(n => { n.vx = 0; n.vy = 0; });
  closeInfoPanel();
}

// ─── SEARCH ──────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const query = searchInput.value.toLowerCase().trim();
  if (!query) {
    searchResults.classList.remove('visible');
    return;
  }

  const matches = nodes.filter(n => n.label.toLowerCase().includes(query) || n.desc.toLowerCase().includes(query));
  searchResults.innerHTML = '';

  if (matches.length > 0) {
    matches.forEach(node => {
      const item = document.createElement('div');
      item.className = 'search-result-item';
      item.innerHTML = `<div>${node.label.replace('\n', ' ')}</div><div class="result-type">${node.type}</div>`;
      item.addEventListener('click', () => {
        selectedNode = node;
        showInfoPanel(node);
        searchInput.value = '';
        searchResults.classList.remove('visible');
      });
      searchResults.appendChild(item);
    });
    searchResults.classList.add('visible');
  } else {
    searchResults.classList.remove('visible');
  }
});

// ─── TOGGLE FUNCTIONS ────────────────────────────────────
function toggleParticles() {
  showParticles = !showParticles;
  document.getElementById('btn-particles').classList.toggle('active', showParticles);
}

function toggleForces() {
  showForces = !showForces;
  document.getElementById('btn-forces').classList.toggle('active', showForces);
  if (showForces) {
    nodes.forEach(n => { n.vx = 0; n.vy = 0; });
  }
}

function togglePulse() {
  showPulse = !showPulse;
  document.getElementById('btn-pulse').classList.toggle('active', showPulse);
}

// ─── INITIALIZATION ──────────────────────────────────────
document.getElementById('stat-nodes').textContent = nodes.length;
document.getElementById('stat-edges').textContent = edges.length;

initParticles();
loop();

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeInfoPanel();
    resetView();
    searchInput.value = '';
    searchResults.classList.remove('visible');
  }
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});
</script>
