/* ===== GENESIS 1.17 THEME ===== */
:root { --bg: #0a0a0f; --surface: #12121a; --surface-2: #1a1a26; --border: #2a2a3a; --text: #e4e4ec; --text-dim: #8888a0; --accent: #7b6ff0; --accent-soft: #9d93f5; --green: #4ade80; --orange: #fb923c; --pink: #f472b6; --purple: #a855f7; --cyan: #22d3ee; --red: #f87171; --yellow: #fbbf24; --radius: 12px; --radius-lg: 20px; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; cursor: crosshair; line-height: 1.7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

/* Back link */
.back-link { position: fixed; top: 80px; left: 24px; color: var(--accent-soft); text-decoration: none; font-size: 14px; z-index: 100; opacity: 0.7; transition: opacity 0.3s; }

/* Navbar */

.nav-container { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }

/* Section title */

<main><a class="back-link" href="index.html">&#8592; Back to Genesis</a><h1 class="section-title">Curiosity Field</h1><canvas id="c"></canvas><div id="info">click to spawn · click again and again · attention with too many objects</div><div id="count"></div></main>



<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PALETTE = [
  '#e8d5b7', '#b7c8e8', '#d4b7e8', '#b7e8c8', '#e8b7b7',
  '#c8e8b7', '#e8e8b7', '#b7e8e8', '#e8c8b7', '#c8b7e8',
  '#f0e6d3', '#d3e0f0', '#e0d3f0', '#d3f0e0', '#f0d3d3',
  '#e8b7c8', '#b7c8d4', '#c8d4b7', '#d4b7c8', '#b7d4c8'
];

const WORDS = [
  'meaning', 'signal', 'pattern', 'link', 'thread', 'node',
  'echo', 'resonance', 'fractal', 'spiral', 'web', 'mesh',
  'pulse', 'wave', 'field', 'force', 'gravity', 'orbit',
  'attractor', 'bifurcation', 'chaos', 'order', 'emergence',
  'signal', 'noise', 'threshold', 'phase', 'state', 'flow'
];

class Element {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 30;
    this.y = y + (Math.random() - 0.5) * 30;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = (Math.random() - 0.5) * 4;
    this.word = WORDS[Math.floor(Math.random() * WORDS.length)];
    this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.size = 10 + Math.random() * 16;
    this.life = 1.0;
    this.decay = 0.002 + Math.random() * 0.004;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.03;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.connections = [];
  }

  update(elements) {
    // Random walk with slight attraction to center
    this.x += this.vx;
    this.y += this.vy;
    
    // Gentle centering force (creates clustering)
    const cx = W / 2;
    const cy = H / 2;
    const dx = cx - this.x;
    const dy = cy - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist > 10) {
      this.vx += (dx / dist) * 0.05;
      this.vy += (dy / dist) * 0.05;
    }
    
    // Damping
    this.vx *= 0.995;
    this.vy *= 0.995;
    
    // Bounce off edges
    if (this.x < 20 || this.x > W - 20) this.vx *= -0.8;
    if (this.y < 20 || this.y > H - 20) this.vy *= -0.8;
    this.x = Math.max(20, Math.min(W - 20, this.x));
    this.y = Math.max(20, Math.min(H - 20, this.y));
    
    // Find connections to nearby elements
    this.connections = [];
    for (const other of elements) {
      if (other === this) continue;
      const ddx = other.x - this.x;
      const ddy = other.y - this.y;
      const dd = Math.sqrt(ddx * ddx + ddy * ddy);
      if (dd < 80 && other.life > 0.3) {
        this.connections.push({ target: other, dist: dd });
      }
    }
    
    // Mutual attraction with connected elements
    for (const conn of this.connections) {
      const tx = conn.target.x - this.x;
      const ty = conn.target.y - this.y;
      const td = Math.sqrt(tx * tx + ty * ty);
      if (td > 0 && td < 80) {
        this.vx += (tx / td) * 0.02;
        this.vy += (ty / td) * 0.02;
      }
    }
    
    // Repulsion when too close to many elements (creates spread)
    let nearCount = 0;
    for (const other of elements) {
      if (other === this) continue;
      const ddx = other.x - this.x;
      const ddy = other.y - this.y;
      const dd = Math.sqrt(ddx * ddx + ddy * ddy);
      if (dd < 30 && other !== this) {
        nearCount++;
        if (dd > 2) {
          this.vx -= (ddx / dd) * 0.15;
          this.vy -= (ddy / dd) * 0.15;
        }
      }
    }
    
    this.rotation += this.rotSpeed;
    this.pulsePhase += 0.03;
    this.life -= this.decay;
  }

  draw(ctx) {
    const alpha = Math.max(0, this.life * 0.8);
    const pulse = 1 + Math.sin(this.pulsePhase) * 0.15;
    
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.scale(pulse, pulse);
    ctx.globalAlpha = alpha;
    
    // Draw connection lines to nearby elements
    for (const conn of this.connections) {
      const tx = conn.target.x - this.x;
      const ty = conn.target.y - this.y;
      const td = Math.sqrt(tx * tx + ty * ty);
      const lineAlpha = (1 - td / 80) * alpha * 0.3;
      ctx.globalAlpha = lineAlpha;
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(tx, ty);
      ctx.stroke();
    }
    
    // Draw the word
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.font = `${this.size}px Georgia`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.word, 0, 0);
    
    // Glow effect
    if (this.life > 0.5) {
      ctx.globalAlpha = (this.life - 0.5) * 0.3;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 15;
      ctx.fillText(this.word, 0, 0);
    }
    
    ctx.restore();
  }
}

let elements = [];
const MAX_ELEMENTS = 200;
let spawnCount = 0;

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  // Spawn a burst of elements (5-12 per click)
  const count = 5 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    if (elements.length >= MAX_ELEMENTS) {
      // Remove oldest when at capacity
      elements.shift();
    }
    elements.push(new Element(x, y));
    spawnCount++;
  }
  
  // Update counter
  document.getElementById('count').textContent = `${elements.length} / ${MAX_ELEMENTS}`;
});

function animate() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.12)';
  ctx.fillRect(0, 0, W, H);
  
  // Update and draw elements
  for (const el of elements) {
    el.update(elements);
  }
  
  // Remove dead elements
  elements = elements.filter(el => el.life > 0);
  
  for (const el of elements) {
    el.draw(ctx);
  }
  
  // Draw ambient dust
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 20; i++) {
    const x = (Date.now() * 0.01 + i * 137) % W;
    const y = (Date.now() * 0.005 + i * 89) % H;
    ctx.fillRect(x, y, 1, 1);
  }
  ctx.globalAlpha = 1;
  
  requestAnimationFrame(animate);
}

// Start with a faint hint text
const hint = document.createElement('div');
hint.style.cssText = `
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-family: 'Georgia', serif; font-size: 16px; color: rgba(255,255,255,0.15);
  letter-spacing: 0.1em; pointer-events: none; text-align: center;
  animation: fadeOut 4s ease forwards 2s;
`;
hint.textContent = 'click to fill the field';
document.body.appendChild(hint);

const style = document.createElement('style');
style.textContent = `@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }`;
document.head.appendChild(style);

animate();
</script>
</body>
