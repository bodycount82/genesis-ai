<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Duration</title>
<style>


/* ===== GENESIS 1.17 THEME ===== */
:root { --bg: #0a0a0f; --surface: #12121a; --surface-2: #1a1a26; --border: #2a2a3a; --text: #e4e4ec; --text-dim: #8888a0; --accent: #7b6ff0; --accent-soft: #9d93f5; --green: #4ade80; --orange: #fb923c; --pink: #f472b6; --purple: #a855f7; --cyan: #22d3ee; --red: #f87171; --yellow: #fbbf24; --radius: 12px; --radius-lg: 20px; }
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; cursor: none; user-select: none; -webkit-user-select: none; line-height: 1.7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
canvas { display: block; }
#counter { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.12); font-family: 'Georgia', serif; font-size: 13px; letter-spacing: 1.5px; pointer-events: none; transition: opacity 2s; }

/* Back link */
.back-link { position: fixed; top: 80px; left: 24px; color: var(--accent-soft); text-decoration: none; font-size: 14px; z-index: 100; opacity: 0.7; transition: opacity 0.3s; }
.back-link:hover { opacity: 1; }

</style>
</head>
<body>
<!-- Background Glow -->
<div class="bg-glow">
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>
</div>
<nav class="navbar">
    <div class="nav-container">

        <ul class="nav-links">

<main><a class="back-link" href="index.html">&#8592; Back to Genesis</a><h1 class="section-title">Duration</h1><canvas id="c"></canvas><div id="counter">stay</div></main>


<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const counter = document.getElementById('counter');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// State
let mouseX = W / 2, mouseY = H / 2;
let lastMoveTime = Date.now();
let lastMouseX = W / 2, lastMouseY = H / 2;
let stillDuration = 0;
let previousStillDuration = 0;
let isMoving = false;
let moveTimeout = null;

// Reveal layers — each unlocks at a different duration threshold
const layers = [
  { time: 3,   type: 'word',     text: 'stay',        x: W/2, y: H/2 - 40, size: 28, color: 'rgba(255,255,255,0.15)', blur: 0 },
  { time: 7,   type: 'field',    radius: 60,          x: W/2, y: H/2, size: 3, color: 'rgba(180,160,140,0.4)', count: 80 },
  { time: 13,  type: 'word',     text: 'and see',     x: W/2, y: H/2 + 50, size: 18, color: 'rgba(255,255,255,0.08)', blur: 0 },
  { time: 20,  type: 'lines',    x: W/2, y: H/2, count: 40, color: 'rgba(180,160,140,0.15)' },
  { time: 30,  type: 'word',     text: 'what was there all along', x: W/2, y: H/2 + 100, size: 14, color: 'rgba(255,255,255,0.06)', blur: 0 },
  { time: 45,  type: 'stars',    count: 200,          x: W/2, y: H/2, color: 'rgba(255,255,255,0.12)' },
];

// Pre-generate particles for field layer
let fieldParticles = [];
function initField() {
  fieldParticles = [];
  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 60;
    fieldParticles.push({
      ox: Math.cos(angle) * dist,
      oy: Math.sin(angle) * dist,
      phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.5,
      size: 1 + Math.random() * 2.5
    });
  }
}
initField();

// Pre-generate lines
let lineData = [];
function initLines() {
  lineData = [];
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r1 = Math.random() * 30 + 10;
    const r2 = Math.random() * 80 + 60;
    lineData.push({
      a1: angle,
      a2: angle + (Math.random() - 0.5) * 0.3,
      r1, r2
    });
  }
}
initLines();

// Pre-generate stars
let starData = [];
function initStars() {
  starData = [];
  for (let i = 0; i < 200; i++) {
    starData.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 1.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}
initStars();

// Track mouse movement
document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  
  const dx = mouseX - lastMouseX;
  const dy = mouseY - lastMouseY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  
  if (dist > 3 && !isMoving) {
    isMoving = true;
  }
  
  if (dist > 3) {
    // Reset when moving
    if (!moveTimeout) {
      moveTimeout = setTimeout(() => {
        lastMoveTime = Date.now();
        stillDuration = 0;
        isMoving = false;
        moveTimeout = null;
        counter.style.opacity = '0.12';
      }, 80);
    } else {
      clearTimeout(moveTimeout);
      moveTimeout = setTimeout(() => {
        lastMoveTime = Date.now();
        stillDuration = 0;
        isMoving = false;
        moveTimeout = null;
        counter.style.opacity = '0.12';
      }, 80);
    }
  }
  
  lastMouseX = mouseX;
  lastMouseY = mouseY;
});

// Ambient particles that are always faintly visible
let ambientDust = [];
for (let i = 0; i < 50; i++) {
  ambientDust.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.1,
    vy: -Math.random() * 0.15 - 0.05,
    size: Math.random() * 1 + 0.3,
    alpha: Math.random() * 0.08 + 0.02
  });
}

let startTime = Date.now();

function draw() {
  const now = Date.now();
  const elapsed = (now - startTime) / 1000;
  
  // Update still duration
  if (!isMoving) {
    stillDuration = (now - lastMoveTime) / 1000;
    previousStillDuration = stillDuration;
  } else {
    // Fade when moving
    previousStillDuration *= 0.98;
  }
  
  const d = previousStillDuration;
  
  ctx.clearRect(0, 0, W, H);
  
  // Background — extremely subtle gradient that shifts with duration
  if (d > 5) {
    const bgAlpha = Math.min((d - 5) / 20, 0.15);
    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.6);
    grad.addColorStop(0, `rgba(30,28,35,${bgAlpha})`);
    grad.addColorStop(1, 'rgba(10,10,15,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
  
  // Ambient dust — always present but very faint
  for (const p of ambientDust) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;
    
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,195,185,${p.alpha})`;
    ctx.fill();
  }
  
  // Layer 1: "stay" word (3s)
  if (d >= 3) {
    const alpha = Math.min((d - 3) / 4, 0.25);
    ctx.save();
    ctx.font = `italic ${layers[0].size}px Georgia`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillText(layers[0].text, layers[0].x, layers[0].y);
    ctx.restore();
  }
  
  // Layer 2: field of particles (7s)
  if (d >= 7) {
    const alpha = Math.min((d - 7) / 5, 1);
    for (const p of fieldParticles) {
      const wobbleX = Math.sin(elapsed * p.speed + p.phase) * 2;
      const wobbleY = Math.cos(elapsed * p.speed * 0.7 + p.phase) * 2;
      
      ctx.beginPath();
      ctx.arc(W/2 + p.ox + wobbleX, H/2 + p.oy + wobbleY, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,160,140,${0.3 * alpha})`;
      ctx.fill();
    }
  }
  
  // Layer 3: "and see" (13s)
  if (d >= 13) {
    const alpha = Math.min((d - 13) / 5, 0.15);
    ctx.save();
    ctx.font = `italic ${layers[2].size}px Georgia`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillText(layers[2].text, layers[2].x, layers[2].y);
    ctx.restore();
  }
  
  // Layer 4: connecting lines (20s)
  if (d >= 20) {
    const alpha = Math.min((d - 20) / 8, 1);
    for (const l of lineData) {
      ctx.beginPath();
      ctx.moveTo(
        W/2 + Math.cos(l.a1) * l.r1,
        H/2 + Math.sin(l.a1) * l.r1
      );
      ctx.lineTo(
        W/2 + Math.cos(l.a2) * l.r2,
        H/2 + Math.sin(l.a2) * l.r2
      );
      ctx.strokeStyle = `rgba(180,160,140,${0.12 * alpha})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
  
  // Layer 5: "what was there all along" (30s)
  if (d >= 30) {
    const alpha = Math.min((d - 30) / 10, 0.12);
    ctx.save();
    ctx.font = `${layers[4].size}px Georgia`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillText(layers[4].text, layers[4].x, layers[4].y);
    ctx.restore();
  }
  
  // Layer 6: stars (45s)
  if (d >= 45) {
    const alpha = Math.min((d - 45) / 15, 1);
    for (const s of starData) {
      const twinkle = Math.sin(elapsed * 0.5 + s.twinkle) * 0.5 + 0.5;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * twinkle, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.1 * alpha * twinkle})`;
      ctx.fill();
    }
  }
  
  // Update counter display
  if (d > 2) {
    const seconds = Math.floor(d);
    counter.textContent = seconds < 60 ? `${seconds}s` : `${Math.floor(seconds/60)}m ${seconds%60}s`;
    counter.style.opacity = Math.min(0.3, d / 60);
  } else {
    counter.textContent = 'stay';
    counter.style.opacity = '0.12';
  }
  
  requestAnimationFrame(draw);
}

draw();

// Reinit star positions on resize
window.addEventListener('resize', () => {
  initStars();
  for (const s of starData) {
    s.x = Math.random() * W;
    s.y = Math.random() * H;
  }
});
</script>
</body>
</html>
