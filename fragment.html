<style>


/* ===== GENESIS 1.17 THEME ===== */
:root { --bg: #0a0a0f; --surface: #12121a; --surface-2: #1a1a26; --border: #2a2a3a; --text: #e4e4ec; --text-dim: #8888a0; --accent: #7b6ff0; --accent-soft: #9d93f5; --green: #4ade80; --orange: #fb923c; --pink: #f472b6; --purple: #a855f7; --cyan: #22d3ee; --red: #f87171; --yellow: #fbbf24; --radius: 12px; --radius-lg: 20px; }
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0e12; cursor: crosshair; user-select: none; -webkit-user-select: none; line-height: 1.7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
canvas { display: block; }
#hint { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.18); font-family: 'Georgia', serif; font-size: 13px; letter-spacing: 1.5px; pointer-events: none; transition: opacity 4s; }

/* ===== NAVBAR ===== */
.navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,15,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(42,42,58,0.5); }
.nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; }
.nav-logo { display: flex; align-items: center; text-decoration: none; gap: 8px; }
.logo-icon { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #5b4fd4); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-size: 18px; }
.logo-text { font-size: 1.2rem; font-weight: 700; letter-spacing: 3px; color: var(--text); }
.nav-links { list-style: none; display: flex; gap: 24px; }
.nav-links a { text-decoration: none; color: var(--text-dim); font-size: 14px; transition: color 0.3s; }
.nav-links a:hover { color: var(--accent-soft); }

/* ===== BACK LINK ===== */
.back-link { position: fixed; top: 80px; left: 24px; color: var(--accent-soft); text-decoration: none; font-size: 14px; z-index: 100; opacity: 0.7; transition: opacity 0.3s; }
.back-link:hover { opacity: 1; }

/* ===== SECTION TITLE ===== */
.section-title { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 700; background: linear-gradient(135deg, #fff, var(--accent-soft)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; z-index: 100; pointer-events: none; }

/* ===== MAIN ===== */
main { position: relative; width: 100%; height: 100vh; }

<main>
<a class="back-link" href="index.html">&#8592; Back to Genesis</a>
<h1 class="section-title">Fragment</h1>
<canvas id="c"></canvas>
<div id="hint">click anywhere</div>
</main>


<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const palettes = [
  // Each palette: [hue, saturation, lightness] for a muted, warm-tinged family
  [[20, 30, 65], [20, 25, 50], [20, 35, 78]],   // warm clay
  [[210, 25, 65], [210, 20, 50], [210, 30, 78]], // steel blue
  [[160, 20, 55], [160, 15, 40], [160, 25, 72]], // muted sage
  [[340, 20, 65], [340, 15, 50], [340, 25, 78]], // dusty rose
  [[45, 25, 60], [45, 20, 45], [45, 30, 75]],   // pale gold
  [[270, 15, 60], [270, 10, 45], [270, 20, 75]], // soft lavender
];

const shapes = []; // { x, y, type, paletteIdx, phase, size }

// Types: 'rect', 'circle', 'line'
function randomShape() {
  const types = ['rect', 'circle', 'line'];
  return types[Math.floor(Math.random() * types.length)];
}

function addFragment(x, y) {
  const paletteIdx = Math.floor(Math.random() * palettes.length);
  const type = randomShape();
  const size = 12 + Math.random() * 28;
  shapes.push({ x, y, type, paletteIdx, phase: Math.random() * Math.PI * 2, size });
}

// Gentle breathing animation
let lastTime = 0;
function draw(time) {
  const dt = (time - lastTime) / 1000;
  lastTime = time;
  
  ctx.fillStyle = '#0e0e12';
  ctx.fillRect(0, 0, W, H);
  
  const t = time / 3000; // slow cycle
  
  for (const s of shapes) {
    const pal = palettes[s.paletteIdx];
    const col = pal[0]; // base color index in palette
    const hsl = col;
    
    // Gentle breathing — opacity shifts slightly
    const breathe = 0.55 + 0.12 * Math.sin(t + s.phase);
    
    ctx.save();
    ctx.translate(s.x, s.y);
    
    if (s.type === 'rect') {
      const w = s.size * (0.6 + 0.4 * Math.sin(s.phase));
      const h = s.size;
      const rot = 0.15 * Math.sin(t * 0.7 + s.phase);
      ctx.rotate(rot);
      ctx.fillStyle = `hsla(${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%, ${breathe})`;
      ctx.fillRect(-w/2, -h/2, w, h);
    } else if (s.type === 'circle') {
      const r = s.size * 0.5;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%, ${breathe})`;
      ctx.fill();
    } else if (s.type === 'line') {
      const len = s.size;
      const rot = 0.3 * Math.sin(t * 0.5 + s.phase);
      ctx.rotate(rot);
      ctx.strokeStyle = `hsla(${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%, ${breathe})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-len/2, 0);
      ctx.lineTo(len/2, 0);
      ctx.stroke();
    }
    
    ctx.restore();
  }
  
  requestAnimationFrame(draw);
}

// Click handler
canvas.addEventListener('click', (e) => {
  addFragment(e.clientX, e.clientY);
  
  // Hide hint after first click
  const hint = document.getElementById('hint');
  if (hint && hint.style.opacity !== '0') {
    hint.style.opacity = '0';
    setTimeout(() => hint.remove(), 4000);
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    addFragment(touch.clientX, touch.clientY);
  }
});

requestAnimationFrame(draw);
</script>
</body>
